<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo UGC | Gamificação de Influência</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="toggle-wrapper">
        <div class="toggle-container">
            <button class="toggle-btn active" data-target="criador">Para Criadores</button>
            <button class="toggle-btn" data-target="empresa">Para Empresas</button>
        </div>
    </div>

    <main class="hero">
        <div class="hero-container">
            
            <div class="hero-content">
                <div class="hero-text-anim-wrapper">
                    <h1 id="hero-title">O jogo mudou. Seu dia a dia agora é uma Missão.</h1>
                    <p id="hero-subtitle">Crie conteúdos reais para marcas locais, evolua seu avatar e ganhe recompensas reais.</p>
                </div>
                <button id="hero-cta" class="btn-cta">Começar Jornada</button>
            </div>

            <div class="hero-visual">
                <div class="visual-gradient-placeholder" id="hero-visual-bg">
                    <div class="visual-glow"></div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
